openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: SpendWise AI API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: categories
    description: Expense/income categories
  - name: labels
    description: Transaction labels/tags
  - name: incomeSources
    description: Income source management
  - name: transactions
    description: Income and expense transactions
  - name: dashboard
    description: Dashboard analytics and summaries
  - name: insights
    description: AI-powered financial insights
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ──────────────────────── CATEGORIES ────────────────────────
  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List all categories
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
    post:
      operationId: createCategory
      tags: [categories]
      summary: Create a category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"

  /categories/{id}:
    patch:
      operationId: updateCategory
      tags: [categories]
      summary: Update a category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryPatch"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "404":
          description: Not found
    delete:
      operationId: deleteCategory
      tags: [categories]
      summary: Delete a category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  # ──────────────────────── LABELS ────────────────────────
  /labels:
    get:
      operationId: listLabels
      tags: [labels]
      summary: List all labels
      responses:
        "200":
          description: List of labels
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Label"
    post:
      operationId: createLabel
      tags: [labels]
      summary: Create a label
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LabelInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Label"

  /labels/{id}:
    patch:
      operationId: updateLabel
      tags: [labels]
      summary: Update a label
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LabelPatch"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Label"
        "404":
          description: Not found
    delete:
      operationId: deleteLabel
      tags: [labels]
      summary: Delete a label
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  # ──────────────────────── INCOME SOURCES ────────────────────────
  /income-sources:
    get:
      operationId: listIncomeSources
      tags: [incomeSources]
      summary: List all income sources
      responses:
        "200":
          description: List of income sources
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/IncomeSource"
    post:
      operationId: createIncomeSource
      tags: [incomeSources]
      summary: Create an income source
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IncomeSourceInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IncomeSource"

  /income-sources/{id}:
    patch:
      operationId: updateIncomeSource
      tags: [incomeSources]
      summary: Update an income source
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IncomeSourcePatch"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IncomeSource"
        "404":
          description: Not found
    delete:
      operationId: deleteIncomeSource
      tags: [incomeSources]
      summary: Delete an income source
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  # ──────────────────────── TRANSACTIONS ────────────────────────
  /transactions:
    get:
      operationId: listTransactions
      tags: [transactions]
      summary: List transactions with optional filters
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [income, expense]
        - name: categoryId
          in: query
          schema:
            type: integer
        - name: startDate
          in: query
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          schema:
            type: string
            format: date
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Paginated list of transactions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionList"
    post:
      operationId: createTransaction
      tags: [transactions]
      summary: Create a transaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransactionInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"

  /transactions/{id}:
    get:
      operationId: getTransaction
      tags: [transactions]
      summary: Get a transaction by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Transaction details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"
        "404":
          description: Not found
    patch:
      operationId: updateTransaction
      tags: [transactions]
      summary: Update a transaction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransactionPatch"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"
        "404":
          description: Not found
    delete:
      operationId: deleteTransaction
      tags: [transactions]
      summary: Delete a transaction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  # ──────────────────────── DASHBOARD ────────────────────────
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary — totals, balance, savings rate
      parameters:
        - name: month
          in: query
          description: Month as YYYY-MM, defaults to current month
          schema:
            type: string
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/trends:
    get:
      operationId: getDashboardTrends
      tags: [dashboard]
      summary: Monthly income vs expense trends for chart
      parameters:
        - name: months
          in: query
          description: Number of past months to include (default 6)
          schema:
            type: integer
            default: 6
      responses:
        "200":
          description: Monthly trend data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MonthlyTrend"

  /dashboard/category-breakdown:
    get:
      operationId: getDashboardCategoryBreakdown
      tags: [dashboard]
      summary: Expense breakdown by category for the current month
      parameters:
        - name: month
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Category breakdown
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CategoryBreakdown"

  /dashboard/income-by-source:
    get:
      operationId: getDashboardIncomeBySource
      tags: [dashboard]
      summary: Income breakdown by source
      parameters:
        - name: month
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Income by source
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/IncomeBySource"

  # ──────────────────────── AI INSIGHTS ────────────────────────
  /insights:
    get:
      operationId: listInsights
      tags: [insights]
      summary: List stored AI insights
      responses:
        "200":
          description: List of insights
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Insight"

  /insights/generate:
    post:
      operationId: generateInsights
      tags: [insights]
      summary: Generate fresh AI-powered financial insights
      responses:
        "200":
          description: Generated insights
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Insight"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    # ── Categories ──
    Category:
      type: object
      required: [id, name, color, type]
      properties:
        id:
          type: integer
        name:
          type: string
        color:
          type: string
          description: Hex color code e.g. "#3B82F6"
        type:
          type: string
          enum: [income, expense, both]
        createdAt:
          type: string
          format: date-time

    CategoryInput:
      type: object
      required: [name, color, type]
      properties:
        name:
          type: string
          minLength: 1
        color:
          type: string
        type:
          type: string
          enum: [income, expense, both]

    CategoryPatch:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        color:
          type: string
        type:
          type: string
          enum: [income, expense, both]

    # ── Labels ──
    Label:
      type: object
      required: [id, name, color]
      properties:
        id:
          type: integer
        name:
          type: string
        color:
          type: string
        createdAt:
          type: string
          format: date-time

    LabelInput:
      type: object
      required: [name, color]
      properties:
        name:
          type: string
          minLength: 1
        color:
          type: string

    LabelPatch:
      type: object
      properties:
        name:
          type: string
        color:
          type: string

    # ── Income Sources ──
    IncomeSource:
      type: object
      required: [id, name]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    IncomeSourceInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string

    IncomeSourcePatch:
      type: object
      properties:
        name:
          type: string
        description:
          type: string

    # ── Transactions ──
    Transaction:
      type: object
      required: [id, type, amount, date]
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [income, expense]
        amount:
          type: number
          format: float
        categoryId:
          type: ["integer", "null"]
        categoryName:
          type: ["string", "null"]
        categoryColor:
          type: ["string", "null"]
        sourceId:
          type: ["integer", "null"]
          description: Income source ID (for income transactions)
        sourceName:
          type: ["string", "null"]
        date:
          type: string
          format: date
        notes:
          type: ["string", "null"]
        labels:
          type: array
          items:
            $ref: "#/components/schemas/Label"
        createdAt:
          type: string
          format: date-time

    TransactionInput:
      type: object
      required: [type, amount, date]
      properties:
        type:
          type: string
          enum: [income, expense]
        amount:
          type: number
          format: float
        categoryId:
          type: ["integer", "null"]
        sourceId:
          type: ["integer", "null"]
        date:
          type: string
          format: date
        notes:
          type: string
        labelIds:
          type: array
          items:
            type: integer

    TransactionPatch:
      type: object
      properties:
        type:
          type: string
          enum: [income, expense]
        amount:
          type: number
          format: float
        categoryId:
          type: ["integer", "null"]
        sourceId:
          type: ["integer", "null"]
        date:
          type: string
          format: date
        notes:
          type: ["string", "null"]
        labelIds:
          type: array
          items:
            type: integer

    TransactionList:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Transaction"
        total:
          type: integer

    # ── Dashboard ──
    DashboardSummary:
      type: object
      required: [totalBalance, monthlyIncome, monthlyExpenses, savingsRate, month]
      properties:
        totalBalance:
          type: number
        monthlyIncome:
          type: number
        monthlyExpenses:
          type: number
        savingsRate:
          type: number
          description: Savings rate as a percentage 0-100
        month:
          type: string
          description: YYYY-MM

    MonthlyTrend:
      type: object
      required: [month, income, expenses]
      properties:
        month:
          type: string
          description: YYYY-MM
        income:
          type: number
        expenses:
          type: number

    CategoryBreakdown:
      type: object
      required: [categoryId, categoryName, color, amount, percentage]
      properties:
        categoryId:
          type: integer
        categoryName:
          type: string
        color:
          type: string
        amount:
          type: number
        percentage:
          type: number

    IncomeBySource:
      type: object
      required: [sourceId, sourceName, amount, percentage]
      properties:
        sourceId:
          type: integer
        sourceName:
          type: string
        amount:
          type: number
        percentage:
          type: number

    # ── AI Insights ──
    Insight:
      type: object
      required: [id, type, title, message, generatedAt]
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [spending_trend, saving_tip, warning, summary]
        title:
          type: string
        message:
          type: string
        generatedAt:
          type: string
          format: date-time
